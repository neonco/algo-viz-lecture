<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сортировка (антипример)</title>
    <!--
    ================================================================
    АНТИПРИМЕР визуализатора сортировки.
    Нарочито плохой вариант для разбора на лекции:
      ✗ нет управления — всё выполняется мгновенно при загрузке;
      ✗ «визуализация» = стена текстового лога, как print-отладка;
      ✗ столбцы меняются сразу, без анимации — глаз не успевает;
      ✗ нет счётчиков, легенды, подсветки — непонятно, что важно;
      ✗ нельзя остановиться на интересном месте и обсудить.
    Хорошая версия — sorting_visualizer.html
    ================================================================
    -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background: #1e1e1e;
            color: #c5c5c5;
            padding: 24px;
            font-size: 13px;
        }

        h1 {
            font-size: 16px;
            font-weight: 400;
            color: #9a9a9a;
            margin-bottom: 16px;
        }

        #bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 120px;
            margin-bottom: 16px;
        }

        #bars div {
            width: 18px;
            background: #4a4a4a;
        }

        #log {
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .dim { color: #6a6a6a; }
    </style>
</head>

<body>
    <h1>C:\visualizer&gt; bubble_sort.exe --trace</h1>
    <div id="bars"></div>
    <div id="log"></div>

    <script>
        // Всё плохо: данные захардкожены, контроля нет, вывод — лог.
        const a = [42, 7, 89, 13, 56, 3, 71, 25, 64, 18, 97, 33];
        const bars = document.getElementById('bars');
        const log = document.getElementById('log');

        function draw() {
            bars.innerHTML = '';
            a.forEach(v => {
                const d = document.createElement('div');
                d.style.height = v + '%';
                bars.appendChild(d);
            });
        }

        let out = `Исходный массив: [${a.join(', ')}]\n\n`;
        let cmp = 0, swp = 0;

        for (let i = 0; i < a.length; i++) {
            for (let j = 0; j < a.length - i - 1; j++) {
                cmp++;
                out += `pass=${i} j=${j}: compare a[${j}]=${a[j]} and a[${j + 1}]=${a[j + 1]}`;
                if (a[j] > a[j + 1]) {
                    [a[j], a[j + 1]] = [a[j + 1], a[j]];
                    swp++;
                    out += ` -> SWAP, a = [${a.join(', ')}]`;
                }
                out += `\n`;
            }
        }
        out += `\nГотово. comparisons=${cmp}, swaps=${swp}\n`;
        out += `Результат: [${a.join(', ')}]`;

        draw();          // столбцы уже отсортированные — анимации не было
        log.textContent = out;   // вся «визуализация» — мгновенная стена текста

        const end = document.createElement('div');
        end.className = 'dim';
        end.textContent = '-- конец лога. перезапустить можно только перезагрузкой страницы --';
        document.body.appendChild(end);
    </script>
</body>

</html>
